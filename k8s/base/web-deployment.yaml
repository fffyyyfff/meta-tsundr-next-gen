apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: meta-tsundr
  labels:
    app: web
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: meta-tsundr
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ghcr.io/fffyyyfff/meta-tsundr-next-gen:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: meta-tsundr-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: meta-tsundr
spec:
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
