apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-service
  namespace: meta-tsundr
  labels:
    app: agent-service
    app.kubernetes.io/name: agent-service
    app.kubernetes.io/part-of: meta-tsundr
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-service
  template:
    metadata:
      labels:
        app: agent-service
    spec:
      containers:
        - name: agent-service
          image: ghcr.io/fffyyyfff/meta-tsundr-agent-service:latest
          ports:
            - containerPort: 3001
          envFrom:
            - secretRef:
                name: meta-tsundr-secrets
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: agent-service
  namespace: meta-tsundr
spec:
  selector:
    app: agent-service
  ports:
    - port: 80
      targetPort: 3001
  type: ClusterIP
