apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-backend
  namespace: meta-tsundr
  labels:
    app: go-backend
    app.kubernetes.io/name: go-backend
    app.kubernetes.io/part-of: meta-tsundr
spec:
  replicas: 2
  selector:
    matchLabels:
      app: go-backend
  template:
    metadata:
      labels:
        app: go-backend
    spec:
      containers:
        - name: go-backend
          image: ghcr.io/fffyyyfff/meta-tsundr-go-backend:latest
          ports:
            - containerPort: 50051
              name: grpc
          envFrom:
            - secretRef:
                name: meta-tsundr-secrets
          env:
            - name: GRPC_PORT
              value: "50051"
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_SSLMODE
              value: disable
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: go-backend
  namespace: meta-tsundr
spec:
  selector:
    app: go-backend
  ports:
    - port: 50051
      targetPort: 50051
      name: grpc
  type: ClusterIP
