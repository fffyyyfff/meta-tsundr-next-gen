apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: meta-tsundr
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/fffyyyfff/meta-tsundr-next-gen.git
    targetRevision: main
    path: k8s/helm/meta-tsundr
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: meta-tsundr
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
