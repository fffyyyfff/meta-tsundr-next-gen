services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: meta_tsundr
      POSTGRES_PASSWORD: meta_tsundr_dev
      POSTGRES_DB: meta_tsundr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
